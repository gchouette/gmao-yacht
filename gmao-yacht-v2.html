<title>GMAO Yacht Pro — Gestion de flotte</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1e293b}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar.collapsed{width:56px}
.sidebar-header{padding:14px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px}
.sidebar-logo{background:#2563eb;color:#fff;padding:7px;border-radius:10px;display:flex;flex-shrink:0}
.sidebar-brand h2{font-size:12px;font-weight:700}.sidebar-brand p{font-size:10px;color:#94a3b8}
.sidebar nav{flex:1;padding:6px;display:flex;flex-direction:column;gap:1px}
.nav-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:none;background:transparent;color:#64748b;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;white-space:nowrap;overflow:hidden}
.nav-btn:hover{background:#f1f5f9;color:#334155}
.nav-btn.active{background:#eff6ff;color:#2563eb}
.nav-btn .dot{margin-left:auto;background:#ef4444;color:#fff;font-size:9px;border-radius:99px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-footer{padding:6px;border-top:1px solid #f1f5f9}
.cloud-badge{font-size:11px;padding:4px 8px;border-radius:6px;text-align:center;margin-bottom:4px;cursor:pointer}
.cloud-badge.off{background:#fef2f2;color:#dc2626}
.cloud-badge.ok{background:#f0fdf4;color:#16a34a}
.cloud-badge.saving{background:#eff6ff;color:#2563eb}
.cloud-badge.err{background:#fef2f2;color:#dc2626}
.cloud-cfg{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-bottom:6px;font-size:11px}
.cloud-cfg input{width:100%;padding:5px 8px;border:1px solid #cbd5e1;border-radius:5px;font-size:11px;margin:4px 0;box-sizing:border-box}
.cloud-cfg .btn{font-size:11px;padding:4px 10px}
.main{flex:1;overflow-y:auto}.main-inner{max-width:1200px;margin:0 auto;padding:24px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px}
.stat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.stat-val{font-size:22px;font-weight:700}.stat-label{font-size:12px;color:#64748b}.stat-sub{font-size:10px;color:#94a3b8;margin-top:2px}
.badge{display:inline-flex;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.b-blue{background:#dbeafe;color:#1e40af}.b-green{background:#d1fae5;color:#065f46}.b-yellow{background:#fef3c7;color:#92400e}
.b-red{background:#fee2e2;color:#991b1b}.b-purple{background:#ede9fe;color:#5b21b6}.b-orange{background:#ffedd5;color:#9a3412}.b-gray{background:#f1f5f9;color:#475569}
.b-cyan{background:#cffafe;color:#155e75}.b-emerald{background:#d1fae5;color:#065f46}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:#2563eb;color:#fff}.btn-p:hover{background:#1d4ed8}
.btn-s{background:#f1f5f9;color:#475569}.btn-s:hover{background:#e2e8f0}
.btn-d{background:#fef2f2;color:#dc2626}.btn-d:hover{background:#fee2e2}
.btn-g{background:#059669;color:#fff}.btn-g:hover{background:#047857}
.btn-sm{padding:4px 8px;font-size:11px}
.icon-btn{padding:5px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:inline-flex;transition:background .15s}
.icon-btn:hover{background:#eff6ff}.icon-btn.danger:hover{background:#fef2f2}
.input,.sel{border:1px solid #cbd5e1;border-radius:8px;padding:7px 10px;font-size:12px;outline:none;width:100%;transition:border-color .15s}
.input:focus,.sel:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.sel{background:#fff;appearance:auto}textarea.input{resize:vertical;min-height:48px}
.form-label{font-size:11px;font-weight:500;color:#475569;margin-bottom:3px;display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-full{grid-column:1/-1}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;color:#64748b;background:#f8fafc;border-bottom:1px solid #e2e8f0;text-transform:uppercase;letter-spacing:.5px}
td{padding:8px 12px;font-size:12px;border-bottom:1px solid #f1f5f9}tr:hover td{background:#f8fafc}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-height:90vh;overflow-y:auto}
.modal-sm{max-width:520px}.modal-lg{max-width:720px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #f1f5f9}
.modal-head h3{font-size:15px;font-weight:600}.modal-body{padding:18px}
.alert{border-radius:10px;padding:14px;margin-bottom:12px}
.alert-or{background:#fff7ed;border:1px solid #fed7aa}.alert-rd{background:#fef2f2;border:1px solid #fecaca}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:160px;padding:6px 0;border-bottom:1px solid #e2e8f0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-fill{width:100%;max-width:44px;border-radius:5px 5px 0 0;transition:height .3s;min-height:2px}
.bar-label{font-size:9px;color:#64748b;text-align:center;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-val{font-size:9px;font-weight:600;color:#334155}
.pie-wrap{display:flex;align-items:center;gap:20px}
.pie{width:140px;height:140px;border-radius:50%;position:relative;flex-shrink:0}
.pie-legend{display:flex;flex-direction:column;gap:4px}
.pie-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#475569}
.pie-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.flex-b{display:flex;align-items:center;justify-content:space-between}
.empty{text-align:center;padding:40px;color:#94a3b8}
.section{display:flex;flex-direction:column;gap:20px}
.workflow-bar{display:flex;gap:2px;align-items:center}
.workflow-step{height:6px;flex:1;border-radius:3px;background:#e2e8f0}
.workflow-step.done{background:#10b981}
.workflow-step.current{background:#3b82f6}
.tree-item{padding:8px 12px;border-left:2px solid #e2e8f0;margin-left:16px;cursor:pointer;transition:all .15s}
.tree-item:hover{background:#f8fafc;border-color:#3b82f6}
.tree-family{font-weight:600;font-size:13px;padding:10px 0;cursor:pointer;display:flex;align-items:center;gap:8px}
.tree-family:hover{color:#2563eb}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:500;background:#f1f5f9;color:#475569}
.nav-section{font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;padding:12px 10px 4px;margin-top:4px;border-top:1px solid #f1f5f9}
.nav-section:first-child{border-top:none;margin-top:0}
.save-bar{display:flex;gap:8px;align-items:center;padding:8px;background:#f8fafc;border-radius:8px;margin-top:4px}
.page{display:flex;flex-direction:column;gap:16px}
.page-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.page-head h2{font-size:20px;font-weight:700}
.tag-ok{background:#d1fae5;color:#065f46}.tag-warn{background:#fee2e2;color:#991b1b}.tag-pending{background:#fef3c7;color:#92400e}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:11px;font-weight:500;color:#475569}
.maint-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;transition:box-shadow .15s}
.maint-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06)}
.maint-card-header{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px 10px;gap:12px}
.maint-card-title{font-size:14px;font-weight:600;color:#1e293b;line-height:1.3}
.maint-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11px;color:#64748b;margin-top:3px}
.maint-card-meta .sep::before{content:'·';margin:0 1px;color:#cbd5e1}
.maint-card-badges{display:flex;gap:5px;align-items:center;flex-shrink:0}
.maint-card-body{padding:0 16px 12px}
.maint-card-detail{font-size:11px;color:#94a3b8;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.maint-card-desc{font-size:12px;color:#475569;background:#f8fafc;border-radius:6px;padding:8px 10px;margin-top:6px;white-space:pre-line;line-height:1.5}
.maint-wf{padding:0 16px 14px}
.maint-wf-bar{display:flex;gap:3px;align-items:center;margin-bottom:4px}
.maint-wf-step{height:8px;flex:1;border-radius:4px;background:#e2e8f0;position:relative;transition:background .2s}
.maint-wf-step.done{background:#10b981}
.maint-wf-step.current{background:#3b82f6}
.maint-wf-labels{display:flex;justify-content:space-between}
.maint-wf-label{font-size:9px;color:#94a3b8;text-align:center;flex:1}
.maint-wf-label.done{color:#059669;font-weight:600}
.maint-wf-label.current{color:#2563eb;font-weight:600}
.maint-card-actions{display:flex;gap:2px}
.maint-prio{display:inline-block;width:4px;border-radius:2px;align-self:stretch;flex-shrink:0}
.prio-urgente,.prio-critique,.prio-haute{background:#ef4444}.prio-normale,.prio-moyenne{background:#f59e0b}.prio-basse{background:#94a3b8}
.photo-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.photo-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;cursor:pointer;border:1px solid #e2e8f0;transition:transform .15s,box-shadow .15s}
.photo-thumb:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.photo-upload-zone{width:72px;height:72px;border-radius:8px;border:2px dashed #cbd5e1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s,background .15s;background:#fafbfc}
.photo-upload-zone:hover{border-color:#3b82f6;background:#eff6ff}
.photo-upload-zone svg{color:#94a3b8}.photo-upload-zone:hover svg{color:#3b82f6}
.photo-upload-zone span{font-size:9px;color:#94a3b8;margin-top:2px}
.photo-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;cursor:pointer;padding:24px}
.photo-lightbox img{max-width:90vw;max-height:85vh;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.photo-lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:rgba(255,255,255,.15);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:none}
.photo-lightbox-close:hover{background:rgba(255,255,255,.3)}
.upload-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:10px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.25);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.upload-toast .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.photo-remove{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:#ef4444;color:#fff;border:2px solid #fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;line-height:1}
.photo-wrap{position:relative;display:inline-block}.photo-wrap:hover .photo-remove{opacity:1}
@media(max-width:900px){.stats,.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
.app{flex-direction:column;height:auto;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;z-index:80;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.15)}
.sidebar.mob-open{transform:translateX(0)}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:79}
.mob-overlay.show{display:block}
.mob-topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:10}
.mob-topbar h2{font-size:14px;font-weight:700;color:#1e293b;flex:1}
.mob-burger{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;flex-shrink:0}
.mob-burger:active{background:#f1f5f9}
.main{overflow-y:auto;flex:1}
.main-inner{padding:14px}
.stats,.g4,.g3,.g2,.form-row{grid-template-columns:1fr}
.flex-b{flex-wrap:wrap;gap:8px}
.pie-wrap{flex-direction:column;align-items:flex-start}
.pie{width:120px;height:120px}
.modal-bg{padding:8px;align-items:flex-end}
.modal{max-height:85vh;border-radius:12px 12px 0 0}
.modal-sm,.modal-lg{max-width:100%}
table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{white-space:nowrap;padding:6px 8px;font-size:11px}
.maint-card-header{flex-direction:column;gap:6px}
.bar-chart{min-width:300px;overflow-x:auto}
.photo-thumb,.photo-upload-zone{width:60px;height:60px}
.btn{padding:8px 14px;font-size:13px}
.btn-sm{padding:6px 10px;font-size:12px}
.nav-btn{padding:10px 12px;font-size:13px}
.input,.sel{padding:9px 12px;font-size:14px}
.cloud-cfg input{font-size:13px;padding:8px 10px}
}
@media(min-width:769px){.mob-topbar{display:none}.mob-overlay{display:none!important}}
</style>

<body>
<div id="app" class="app"></div>
<script>
// ─── Core DOM helper ───
const S=(tag,attrs,...kids)=>{const el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k==='className')el.className=v;else if(k==='innerHTML')el.innerHTML=v;else if(k==='value')el.value=v;else if(k==='checked')el.checked=v;else if(k==='selected')el.selected=v;else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else el.setAttribute(k,v)});kids.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c)});return el};
let state={},renderScheduled=false;
const LS_KEY='gmao-yacht-data';
const LS_CFG='gmao-yacht-config';
const DATA_KEYS=['vessels','equipage','composants','maint','couts','inventaire','journal','documents','charters','apaDep','revenus','reglementaire'];

// ─── Cloud sync ───
function getCloudUrl(){try{const c=JSON.parse(localStorage.getItem(LS_CFG)||'{}');return c.appsScriptUrl||''}catch(e){return ''}}
function setCloudUrl(url){try{const c=JSON.parse(localStorage.getItem(LS_CFG)||'{}');c.appsScriptUrl=url;localStorage.setItem(LS_CFG,JSON.stringify(c));if(url){_blockSaveUntilLoaded=true;console.log('[GMAO Cloud] URL set — blocking saves until cloud load completes')}}catch(e){}}
let _blockSaveUntilLoaded=false;
let _localDirty=false;
let cloudSaveTimer=null;
let cloudStatus='idle'; // idle, saving, saved, error, loading
function updateCloudBadge(){const el=document.getElementById('cloud-badge');if(!el)return;const url=getCloudUrl();if(!url){el.textContent='☁ Non connecté';el.className='cloud-badge off';return}if(cloudStatus==='saving'){el.textContent='☁ Synchronisation…';el.className='cloud-badge saving'}else if(cloudStatus==='saved'){el.textContent='☁ Synchronisé';el.className='cloud-badge ok'}else if(cloudStatus==='error'){el.textContent='☁ Erreur sync';el.className='cloud-badge err'}else if(cloudStatus==='loading'){el.textContent='☁ Chargement…';el.className='cloud-badge saving'}else{el.textContent='☁ Connecté';el.className='cloud-badge ok'}}

function cloudSave(){
  const url=getCloudUrl();if(!url)return;
  if(_blockSaveUntilLoaded){console.log('[GMAO Cloud] Save blocked — waiting for initial cloud load');return}
  cloudStatus='saving';updateCloudBadge();
  const d={};DATA_KEYS.forEach(k=>d[k]=state[k]);
  const payload=JSON.stringify({action:'saveAll',data:d});
  console.log('[GMAO Cloud] Saving…',Object.keys(d).map(k=>k+':'+((d[k]&&d[k].length)||0)).join(', '));
  fetch(url,{method:'POST',body:payload,redirect:'follow'})
    .then(r=>{
      console.log('[GMAO Cloud] Response status:',r.status,r.redirected?'(redirected)':'');
      return r.json().catch(()=>null);
    })
    .then(j=>{
      console.log('[GMAO Cloud] Response body:',j);
      if(j&&j.ok){cloudStatus='saved';state._lastCloudSave=Date.now();_localDirty=false;console.log('[GMAO Cloud] Save confirmed OK — dirty flag cleared')}
      else if(j&&j.error){cloudStatus='error';console.error('[GMAO Cloud] Save error:',j.error)}
      else{cloudStatus='error';console.error('[GMAO Cloud] Unexpected response:',j)}
      updateCloudBadge();
    })
    .catch(e=>{
      console.error('[GMAO Cloud] Fetch failed:',e.message,', trying no-cors fallback…');
      fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:payload,mode:'no-cors'})
        .then(()=>{cloudStatus='saved';state._lastCloudSave=Date.now();updateCloudBadge();console.log('[GMAO Cloud] no-cors fallback sent (no confirmation)')})
        .catch(e2=>{cloudStatus='error';updateCloudBadge();console.error('[GMAO Cloud] Fallback also failed:',e2.message)});
    });
}
function cloudSaveDebounced(){clearTimeout(cloudSaveTimer);cloudSaveTimer=setTimeout(()=>{cloudSave();cloudSaveTimer=null},800)}
// Save on page close/hide (beforeunload for desktop, visibilitychange+pagehide for mobile)
window.addEventListener('beforeunload',()=>{if(cloudSaveTimer){clearTimeout(cloudSaveTimer);cloudSave()}});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden'){if(cloudSaveTimer){clearTimeout(cloudSaveTimer);cloudSave();cloudSaveTimer=null}}else if(document.visibilityState==='visible'){if(getCloudUrl()){const sinceSave=Date.now()-(state._lastCloudSave||0);const delay=sinceSave<5000?5000-sinceSave:500;setTimeout(()=>cloudLoad(true),delay)}}});
window.addEventListener('pagehide',()=>{if(cloudSaveTimer){clearTimeout(cloudSaveTimer);cloudSave();cloudSaveTimer=null}})

function cloudLoad(force){
  const url=getCloudUrl();if(!url)return Promise.resolve(false);
  if(!force&&cloudSaveTimer){console.log('[GMAO Cloud] Load skipped (save pending)');return Promise.resolve(false)}
  if(_localDirty&&!_blockSaveUntilLoaded){console.log('[GMAO Cloud] Load skipped (local changes not yet saved to cloud)');return Promise.resolve(false)}
  cloudStatus='loading';updateCloudBadge();
  console.log('[GMAO Cloud] Loading from cloud…');
  return fetch(url+'?action=loadAll')
    .then(r=>r.json())
    .then(d=>{
      let hasData=false;
      console.log('[GMAO Cloud] Loaded:',Object.keys(d).map(k=>k+':'+((d[k]&&d[k].length)||0)).join(', '));
      DATA_KEYS.forEach(k=>{
        if(d[k]!==undefined){
          if(Array.isArray(d[k])&&d[k].length&&state[k]&&state[k].length){
            const localById={};state[k].forEach(item=>{if(item.id)localById[item.id]=item});
            d[k]=d[k].map(item=>{
              const local=localById[item.id];
              if(local){Object.keys(local).forEach(key=>{if(item[key]===undefined||item[key]==='')item[key]=local[key]})}
              return item;
            });
          }
          state[k]=Array.isArray(d[k])?d[k]:[];hasData=true;
        }
      });
      cloudStatus='saved';_blockSaveUntilLoaded=false;updateCloudBadge();
      console.log('[GMAO Cloud] Load complete — saves unblocked');
      if(hasData){const sd={};DATA_KEYS.forEach(k=>sd[k]=state[k]);localStorage.setItem(LS_KEY,JSON.stringify(sd));render()}
      return hasData;
    })
    .catch(e=>{cloudStatus='error';updateCloudBadge();console.error('[GMAO Cloud] Load failed:',e.message);return false});
}

async function uploadPhotoToCloud(base64DataUrl,fileName){
  const url=getCloudUrl();
  if(!url)return base64DataUrl;
  const parts=base64DataUrl.split(',');
  const mimeMatch=parts[0].match(/data:(.*?);/);
  const mimeType=mimeMatch?mimeMatch[1]:'image/jpeg';
  const raw=parts[1];
  const fName=fileName||('gmao_'+Date.now()+(mimeType.includes('pdf')?'.pdf':'.jpg'));
  const payload=JSON.stringify({action:'uploadPhoto',base64:raw,mimeType:mimeType,fileName:fName});
  // Try with redirect follow first, then no-cors fallback
  try{
    const resp=await fetch(url,{method:'POST',redirect:'follow',body:payload});
    try{const d=await resp.json();if(d.ok&&d.url)return d.url;if(d.ok&&d.driveUrl)return d.driveUrl;}catch(e){}
  }catch(e){}
  // Fallback: no-cors (file still gets uploaded but we can't read the URL)
  try{
    await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:payload,mode:'no-cors'});
  }catch(e){}
  return base64DataUrl;
}

function compressImage(dataUrl,maxW,maxH,quality){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',quality));
    };
    img.src=dataUrl;
  });
}
function photoUpload(photos,onAdd,onRemove){
  const grid=S('div',{className:'photo-grid'});
  (photos||[]).forEach((src,i)=>{
    const wrap=S('div',{className:'photo-wrap'});
    const isPdf=typeof src==='string'&&(src.toLowerCase().includes('.pdf')||src.includes('application/pdf'));
    if(isPdf){
      const pdfThumb=S('a',{href:src,target:'_blank',className:'photo-thumb',style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#fef2f2',textDecoration:'none',borderRadius:'6px',fontSize:'10px',color:'#ef4444',fontWeight:600}});

      wrap.appendChild(pdfThumb);
    }else{
      const img=S('img',{className:'photo-thumb',src:src});
      img.addEventListener('click',()=>showLightbox(src));
      wrap.appendChild(img);
    }
    const rm=S('button',{className:'photo-remove',onClick:e=>{e.stopPropagation();onRemove(i);}});
    rm.textContent='×';
    wrap.appendChild(rm);
    grid.appendChild(wrap);
  });
  // Upload button
  const zone=S('div',{className:'photo-upload-zone'});

  zone.appendChild(S('span',{},'Fichier'));
  const inp=S('input',{type:'file',accept:'image/*,.pdf',multiple:'true',style:{display:'none'}});
  inp.addEventListener('change',e=>{
    Array.from(e.target.files).forEach(f=>{
      if(f.size>10*1024*1024){alert('Fichier trop volumineux (max 10 Mo)');return}
      showUploadToast('Préparation de '+f.name+'…');
      const reader=new FileReader();
      reader.onload=async ev=>{
        const isPdf=f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf');
        if(isPdf){
          if(getCloudUrl()){
            const url=await uploadPhotoToCloud(ev.target.result,f.name);onAdd(url);hideUploadToast();
          }else{onAdd(ev.target.result);hideUploadToast()}
        }else{
          const compressed=await compressImage(ev.target.result,1200,900,0.6);
          if(getCloudUrl()){
            const url=await uploadPhotoToCloud(compressed,f.name);onAdd(url);hideUploadToast();
          }else{onAdd(compressed);hideUploadToast()}
        }
      };
      reader.readAsDataURL(f);
    });
    inp.value='';
  });
  zone.addEventListener('click',()=>inp.click());
  zone.appendChild(inp);
  grid.appendChild(zone);
  return grid;
}

function wfBar(steps){
  const wrap=S('div',{className:'maint-wf'});
  const bar=S('div',{className:'maint-wf-bar'});
  const labels=S('div',{className:'maint-wf-labels'});
  const doneSteps=steps.map(s=>s.step);
  const lastDone=doneSteps.length?doneSteps[doneSteps.length-1]:null;
  WF_STEPS.forEach(ws=>{
    const step=steps.find(s=>s.step===ws);
    const isCurrent=ws===lastDone;
    let cls='maint-wf-step';
    if(step)cls+=' done';
    if(isCurrent)cls+=' current';
    const el=S('div',{className:cls});
    if(step){el.title=step.date+(step.par?' par '+step.par:'');}
    bar.appendChild(el);
    let lCls='maint-wf-label';
    if(step)lCls+=' done';
    if(isCurrent)lCls+=' current';
    labels.appendChild(S('div',{className:lCls},ws));
  });
  wrap.appendChild(bar);
  wrap.appendChild(labels);
  return wrap;
}
function getHivernageChecklist(vesselNom){
  const isMotor=vesselNom.toLowerCase().includes('sunreef')||vesselNom.toLowerCase().includes('power')||vesselNom.toLowerCase().includes('moteur');
  const base=[
    'Vidange moteurs + remplacement antigel',
    'Rinçage complet circuits eau de mer',
    'Vidange circuit eau douce + ajout antigel sanitaire',
    'Vérification et graissage vannes de coque',
    'Fermeture vannes de coque et passes-coques',
    'Débranchement et stockage batteries (contrôle tension)',
    'Rinçage et séchage réservoirs carburant',
    'Nettoyage fond de cale + traitement anti-moisissure',
    'Vérification amarres et défenses',
    'Bâchage / pose housse hivernage',
    'Ventilation intérieure (ouverture aérations + déshumidificateur)',
    'Débranchement électronique sensible (GPS, VHF, AIS)',
    'Vidange et nettoyage réservoir eaux noires',
    'Contrôle et charge extincteurs',
    'Nettoyage et traitement teck / surfaces extérieures',
    'Inventaire pièces détachées à commander pour remise en service',
    'Rapport photographique état général avant hivernage'
  ];
  const sail=['Inspection et rangement voiles (grand-voile, génois, spi)','Graissage winches et accastillage de pont','Rinçage et lubrification enrouleurs'];
  const motor=['Vidange et hivernage groupe électrogène','Hivernage climatisation (vidange, nettoyage filtres)','Vidange hydraulique (stabilisateurs, passerelle)','Nettoyage et protection gelcoat coque'];
  const items=isMotor?[...base,...motor]:[...base,...sail];
  return items.map((t,i)=>({id:i+1,text:t,done:false}));
}
function createHivernageTask(vesselId){
  const v=state.vessels.find(x=>x.id===vesselId);if(!v)return;
  const exists=state.maint.some(m=>m.nId===vesselId&&m.titre&&m.titre.toLowerCase().includes('hivernage'));
  if(exists&&!confirm('Une tâche hivernage existe déjà pour ce navire. En créer une nouvelle ?'))return;

  const newTask={id:nId(state.maint),nId:vesselId,compId:null,cat:'Coque & antifouling',titre:'Checklist hivernage '+v.nom,prio:'Haute',statut:'Planifiée',echeance:new Date(new Date().getFullYear(),10,1).toISOString().split('T')[0],dateFin:null,dateRealisation:null,freq:365,cout:isMotor?5000:3500,coutReel:null,assigneA:null,desc:'Procédure complète de mise en hivernage',justif:'En attente',workflow:[{step:'Demandée',par:state.currentUser?state.currentUser.nom:'',date:today()}],photos:[],recurrence:'annuelle',parentId:null,checklist:getHivernageChecklist(v.nom),factures:[]};
  setState(s=>({maint:[...s.maint,newTask]}));
}

    const crewTbl=S('table',{});
    const cthead=S('thead',{});const chr=S('tr',{});
    ['Navire','Membre','Rôle','Salaire','Charges','Total'].forEach(h=>chr.appendChild(S('th',{style:['Salaire','Charges','Total'].includes(h)?{textAlign:'right'}:{}},h)));
    cthead.appendChild(chr);crewTbl.appendChild(cthead);
    const ctbody=S('tbody',{});

      tr.appendChild(S('td',{},vesselName(c.nId)));
      tr.appendChild(S('td',{style:{fontWeight:500}},c.nom));

      tr.appendChild(S('td',{style:{textAlign:'right'}},fmt(c.salaire||0)));
      tr.appendChild(S('td',{style:{textAlign:'right'}},fmt(c.charges||0)));
      tr.appendChild(S('td',{style:{textAlign:'right',fontWeight:600}},fmt((c.salaire||0)+(c.charges||0))));
      ctbody.appendChild(tr);

    // Total row

    ttr.appendChild(S('td',{colSpan:'3'},'Total mensuel'));

    ttr.appendChild(S('td',{style:{textAlign:'right'}},fmt(totalChg)));
    ttr.appendChild(S('td',{style:{textAlign:'right',color:'#8b5cf6'}},fmt(totalCrew)));

    crewTbl.appendChild(ctbody);crewCard.appendChild(crewTbl);
    sec.appendChild(crewCard);

  // Justif filter

  });
  filterBar.appendChild(S('button',{className:'btn btn-s btn-sm',style:{marginLeft:'auto'},onClick:()=>exportCSV(fc,['id','desc','cat','montant','date','fournisseur','justif'],'couts.csv')},icon('download',12),' CSV'));
  sec.appendChild(filterBar);
  // Filter
  let displayed=fc;
  if(state.justifFilter)displayed=displayed.filter(c=>c.justif===state.justifFilter);
  // Cost by category chart
  const cats={};displayed.forEach(c=>{cats[c.cat]=(cats[c.cat]||0)+c.montant;});
  const catEntries=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  if(catEntries.length){
    const chartSec=S('div',{className:'card',style:{marginBottom:'12px',padding:'18px 20px'}});
    chartSec.appendChild(S('div',{style:{fontWeight:600,fontSize:'14px',marginBottom:'16px',color:'#1e293b'}},'Répartition par catégorie'));
    const maxVal=Math.max(...catEntries.map(e=>e[1]),1);
    const barColors=['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4'];
    catEntries.forEach(([cat,val],i)=>{
      const pct=((val/maxVal)*100).toFixed(0);
      const row=S('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'12px'}});
      row.appendChild(S('div',{style:{width:'120px',fontSize:'12px',textAlign:'right',color:'#475569',fontWeight:500,flexShrink:0}},cat));
      row.appendChild(S('div',{style:{flex:1,background:'#f1f5f9',borderRadius:'6px',height:'28px',overflow:'hidden',position:'relative'}},
        S('div',{style:{width:pct+'%',height:'100%',background:barColors[i%barColors.length],borderRadius:'6px',transition:'width .4s ease'}})
      ));
      row.appendChild(S('div',{style:{width:'90px',fontSize:'13px',fontWeight:600,color:'#1e293b',textAlign:'right',flexShrink:0}},fmt(val)));
      chartSec.appendChild(row);
    });
    sec.appendChild(chartSec);
  }
  // Table
  if(!displayed.length){sec.appendChild(S('p',{style:{color:'#94a3b8'}},'Aucun coût.'));}
  const tbl=S('table',{});
  const thead=S('thead',{});
  const hr=S('tr',{});['Navire','Description','Catégorie','Montant','Date','Fournisseur','Justif.','Paiement','Statut','Pièces',''].forEach(h=>hr.appendChild(S('th',{},h)));
  thead.appendChild(hr);tbl.appendChild(thead);
  const tbody=S('tbody',{});
  displayed.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(c=>{
    const tr=S('tr',{});
    tr.appendChild(S('td',{},vesselName(c.nId)));
    tr.appendChild(S('td',{},c.desc+(c.maintId?' 🔧':'')));
    tr.appendChild(S('td',{},c.cat));
    tr.appendChild(S('td',{style:{fontWeight:600}},fmt(c.montant)));
    tr.appendChild(S('td',{},c.date||'-'));
    tr.appendChild(S('td',{},c.fournisseur||'-'));
    const jCls=c.justif==='Justifié'?'tag-ok':c.justif==='Manquant'?'tag-warn':'tag-pending';
    tr.appendChild(S('td',{},S('span',{className:'tag '+jCls},c.justif)));
    tr.appendChild(S('td',{},c.datePaiement?fD(c.datePaiement):'—'));
    const spCls=c.statutPaiement==='Payé'?'tag-ok':c.statutPaiement==='Annulé'?'tag-warn':'tag-pending';
    tr.appendChild(S('td',{},S('span',{className:'tag '+spCls},c.statutPaiement||'En attente')));
    // Photos column
    const photosTd=S('td',{});
    const cPhotos=c.photos||[];
    if(cPhotos.length){
      const thumbRow=S('div',{style:{display:'flex',gap:'3px',flexWrap:'wrap'}});
      cPhotos.slice(0,3).forEach(src=>{const img=S('img',{src:src,style:{width:'28px',height:'28px',borderRadius:'4px',objectFit:'cover',cursor:'pointer',border:'1px solid #e2e8f0'}});img.addEventListener('click',()=>showLightbox(src));thumbRow.appendChild(img)});
      if(cPhotos.length>3)thumbRow.appendChild(S('span',{style:{fontSize:'10px',color:'#64748b',alignSelf:'center'}},'+'+String(cPhotos.length-3)));
      photosTd.appendChild(thumbRow);
    } else { photosTd.appendChild(S('span',{style:{color:'#cbd5e1',fontSize:'11px'}},'—')); }
    tr.appendChild(photosTd);
    const acts=S('td',{});
    acts.appendChild(S('button',{className:'icon-btn',onClick:()=>openModal('editCout',{...c})},icon('edit',14)));
    acts.appendChild(S('button',{className:'icon-btn danger',onClick:()=>{if(confirm('Supprimer ce coût ?'))setState(s=>({couts:s.couts.filter(x=>x.id!==c.id)}))}},icon('trash',14)));
    tr.appendChild(acts);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);sec.appendChild(tbl);
  // Modal
  if(state.modal==='addCout'||state.modal==='editCout'){
    sec.appendChild(renderModal(state.modal==='addCout'?'Ajouter un coût':'Modifier',true,()=>{
      const ed=state.edit;const f=S('div',{className:'form-row'});
      f.appendChild(makeVesselSel(ed.nId,e=>setState(s=>({edit:{...s.edit,nId:+e.target.value}}))));
      f.appendChild(makeInput('Description',null,ed.desc,e=>setState(s=>({edit:{...s.edit,desc:e.target.value}}))));
      f.appendChild(makeSelect('Catégorie',['Maintenance','Carburant','Port & Marina','Assurance','Équipage','Pièces','Autre'],ed.cat,e=>setState(s=>({edit:{...s.edit,cat:e.target.value}}))));
      f.appendChild(makeInput('Montant (€)','number',ed.montant,e=>setState(s=>({edit:{...s.edit,montant:+e.target.value}}))));
      f.appendChild(makeInput('Date','date',ed.date,e=>setState(s=>({edit:{...s.edit,date:e.target.value}}))));
      f.appendChild(makeInput('Fournisseur',null,ed.fournisseur,e=>setState(s=>({edit:{...s.edit,fournisseur:e.target.value}}))));
      f.appendChild(makeSelect('Justificatif',JUSTIFS,ed.justif,e=>setState(s=>({edit:{...s.edit,justif:e.target.value}}))));
      f.appendChild(makeInput('Date de paiement','date',ed.datePaiement||'',e=>setState(s=>({edit:{...s.edit,datePaiement:e.target.value}}))));
      f.appendChild(makeSelect('Statut paiement',['En attente','Payé','Annulé'],ed.statutPaiement||'En attente',e=>setState(s=>({edit:{...s.edit,statutPaiement:e.target.value}}))));
      // Photo upload for justificatif
      const photoSec=S('div',{className:'form-full',style:{marginTop:'8px'}});
      photoSec.appendChild(S('label',{className:'form-label'},'📎 Justificatif / facture (photo ou PDF)'));
      photoSec.appendChild(photoUpload(ed.photos||[],
        src=>setState(s=>({edit:{...s.edit,photos:[...(s.edit.photos||[]),src]}})),
        idx=>setState(s=>{const p=[...(s.edit.photos||[])];p.splice(idx,1);return{edit:{...s.edit,photos:p}}})
      ));
      f.appendChild(photoSec);
      const btns=S('div',{className:'form-full',style:{display:'flex',justifyContent:'flex-end',gap:'8px',marginTop:'8px'}});
      btns.appendChild(S('button',{className:'btn btn-s',onClick:closeModal},'Annuler'));
      btns.appendChild(S('button',{className:'btn btn-p',onClick:()=>{const e=state.edit;if(!e.desc)return;if(state.modal==='addCout')setState(s=>({couts:[...s.couts,{...e,id:nId(s.couts)}],modal:null,edit:null}));else setState(s=>({couts:s.couts.map(c=>c.id===e.id?{...e}:c),modal:null,edit:null}))}},icon('save',14),' Enregistrer'));
      f.appendChild(btns);return f;
    }));
  }
  return sec;
}

// ─── Génération des salaires mensuels ───
function generateCrewCosts(month){
  // month format: "YYYY-MM"
  const activeCrew=state.equipage.filter(e=>e.actif&&(e.salaire||e.charges));
  if(!activeCrew.length)return 0;
  // Check contract dates
  let count=0;
  setState(s=>{
    let newCouts=[...s.couts];
    activeCrew.forEach(c=>{
      // Skip if crew not active during this month
      if(c.dateDebut&&c.dateDebut.slice(0,7)>month)return;
      if(c.permanent===false&&c.dateFin&&c.dateFin.slice(0,7)<month)return;
      // Month/year label for description
      const [mY,mM]=month.split('-');const moisNoms=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];const moisLabel=moisNoms[parseInt(mM,10)-1]+' '+mY;
      // Combined salary + charges entry
      const crewKey='crew-sc-'+c.id+'-'+month;
      if(!newCouts.find(x=>x.crewCostId===crewKey)){
        const totalMontant=(c.salaire||0)+(c.charges||0);
        newCouts.push({id:nId(newCouts),nId:c.nId,cat:'Équipage',desc:'💰 Salaire et charges — '+c.nom+' — '+moisLabel,montant:totalMontant,date:month+'-01',fournisseur:'',justif:'En attente',photos:[],crewCostId:crewKey,datePaiement:'',statutPaiement:'En attente'});
        count++;
      }
    });
    return{couts:newCouts};
  });
  return count;
}

// ─── Comptabilité (monthly extraction) ───
function pgCompta(){
  const sec=S('div',{className:'page'});

    )

  // Date range filter
  const now=new Date();const curMonth=now.toISOString().slice(0,7);
  if(!state.comptaMois)state.comptaMois=curMonth;
  if(!state.comptaMode)state.comptaMode='mois';

  const modeToggle=S('div',{style:{display:'flex',borderRadius:'6px',overflow:'hidden',border:'1px solid #cbd5e1'}});
  ['mois','annee','periode'].forEach(m=>{

    modeToggle.appendChild(S('button',{style:{padding:'4px 12px',fontSize:'12px',fontWeight:active?600:400,background:active?'#2563eb':'#fff',color:active?'#fff':'#334155',border:'none',cursor:'pointer'},onClick:()=>setState({comptaMode:m})},label));

  }else if(state.comptaMode==='annee'){
    if(!state.comptaAnnee)state.comptaAnnee=String(now.getFullYear());
    const ySel=S('select',{value:state.comptaAnnee,style:{padding:'4px 8px',border:'1px solid #cbd5e1',borderRadius:'6px',fontSize:'13px'},onchange:e=>setState({comptaAnnee:e.target.value})});
    const curY=now.getFullYear();for(let y=curY-5;y<=curY+2;y++)ySel.appendChild(S('option',{value:String(y),selected:String(y)===state.comptaAnnee},String(y)));
    filterBar.appendChild(ySel);
  }else{
    if(!state.comptaDebut)state.comptaDebut=curMonth+'-01';
    if(!state.comptaFin)state.comptaFin=now.toISOString().slice(0,10);
    filterBar.appendChild(S('label',{style:{fontSize:'12px',color:'#64748b'}},'Du'));
    filterBar.appendChild(S('input',{type:'date',value:state.comptaDebut,style:{padding:'4px 8px',border:'1px solid #cbd5e1',borderRadius:'6px',fontSize:'13px'},onchange:e=>setState({comptaDebut:e.target.value})}));
    filterBar.appendChild(S('label',{style:{fontSize:'12px',color:'#64748b'}},'au'));
    filterBar.appendChild(S('input',{type:'date',value:state.comptaFin,style:{padding:'4px 8px',border:'1px solid #cbd5e1',borderRadius:'6px',fontSize:'13px'},onchange:e=>setState({comptaFin:e.target.value})}));
  }
  sec.appendChild(filterBar);
  // Filter data by mode
  let mCouts,mRevs,periodeNom;
  if(state.comptaMode==='mois'){
    const mois=state.comptaMois||curMonth;
    periodeNom=mois;
    mCouts=filterByVessel(state.couts).filter(c=>c.date&&c.date.startsWith(mois));
    mRevs=filterByVessel(state.revenus).filter(r=>r.date&&r.date.startsWith(mois));
  }else if(state.comptaMode==='annee'){
    const yr=state.comptaAnnee||String(now.getFullYear());
    periodeNom=yr;
    mCouts=filterByVessel(state.couts).filter(c=>c.date&&c.date.startsWith(yr));
    mRevs=filterByVessel(state.revenus).filter(r=>r.date&&r.date.startsWith(yr));
  }else{
    const d0=state.comptaDebut||'';const d1=state.comptaFin||'9999';
    periodeNom=d0+' — '+d1;
    mCouts=filterByVessel(state.couts).filter(c=>c.date&&c.date>=d0&&c.date<=d1);
    mRevs=filterByVessel(state.revenus).filter(r=>r.date&&r.date>=d0&&r.date<=d1);
  }
  // Salary generation button — adapts to mois/année/période
  const crewWithSalary=state.equipage.filter(e=>e.actif&&(e.salaire||e.charges));
  if(crewWithSalary.length){
    // Compute list of months to generate for
    function getMonthsForPeriod(){
      if(state.comptaMode==='mois')return [state.comptaMois||curMonth];
      if(state.comptaMode==='annee'){
        const yr=state.comptaAnnee||String(now.getFullYear());
        const ms=[];for(let m=1;m<=12;m++)ms.push(yr+'-'+String(m).padStart(2,'0'));return ms;
      }
      // période
      const d0=state.comptaDebut||curMonth+'-01';const d1=state.comptaFin||now.toISOString().slice(0,10);
      const startM=d0.slice(0,7);const endM=d1.slice(0,7);
      const ms=[];let cur=startM;
      while(cur<=endM){ms.push(cur);const [y,m]=cur.split('-').map(Number);const nm=m===12?1:m+1;const ny=m===12?y+1:y;cur=ny+'-'+String(nm).padStart(2,'0');if(ms.length>120)break;}
      return ms;
    }
    const genMonths=getMonthsForPeriod();

    let alreadyGenerated=0,expectedCount=0;
    genMonths.forEach(gm=>{

      crewWithSalary.forEach(c=>{
        if(c.dateDebut&&c.dateDebut.slice(0,7)>gm)return;

    }else{

function render(){
  // Save focus state before re-render
  const ae=document.activeElement;
  let focusInfo=null;
  if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT')){
    const modal=ae.closest('.modal');
    const parent=ae.parentElement;
    const label=parent?parent.querySelector('.form-label,.form-group label,label'):null;
    focusInfo={
      tag:ae.tagName,type:ae.type||'',labelText:label?label.textContent:'',
      selStart:ae.selectionStart,selEnd:ae.selectionEnd,val:ae.value
    };
  }
  // Save modal scroll position
  const oldModal=document.querySelector('.modal');
  const modalScrollTop=oldModal?oldModal.scrollTop:0;
  // Save main scroll position
  const oldMain=document.querySelector('.main');
  const mainScrollTop=oldMain?oldMain.scrollTop:0;
  const app=document.getElementById('app');
  app.innerHTML='';

  // Login screen
  if(!state.currentUser){
    const loginScreen=S('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'center',minHeight:'100vh',background:'linear-gradient(135deg, #2563eb 0%, #1e40af 100%)',padding:'40px 20px',boxSizing:'border-box',overflowY:'auto'}});
    const loginCard=S('div',{style:{background:'#fff',borderRadius:'16px',padding:'48px',maxWidth:'600px',width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,.3)',textAlign:'center'}});
    loginCard.appendChild(S('div',{style:{fontSize:'48px',marginBottom:'16px'}},'⚓'));
    loginCard.appendChild(S('h1',{style:{fontSize:'28px',fontWeight:700,color:'#1e293b',marginBottom:'8px'}},'GMAO Yacht Fleet'));
    if(state.loginPendingUser){
      const pendingU=USERS.find(u=>u.id===state.loginPendingUser);
      loginCard.appendChild(S('p',{style:{fontSize:'14px',color:'#64748b',marginBottom:'24px'}},'Mot de passe pour '+(pendingU?pendingU.nom:'')));
      const errMsg=state.loginError?S('div',{style:{color:'#dc2626',fontSize:'13px',marginBottom:'12px'}},'Mot de passe incorrect'):null;
      if(errMsg)loginCard.appendChild(errMsg);
      const pwdInp=S('input',{type:'password',placeholder:'Mot de passe',autocomplete:'current-password',style:{width:'100%',maxWidth:'300px',padding:'12px 16px',border:'1px solid #e2e8f0',borderRadius:'8px',fontSize:'16px',marginBottom:'16px',boxSizing:'border-box'}});
      pwdInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();tryLogin()}});
      function tryLogin(){
        const pwd=pwdInp.value;
        if(checkUserPassword(state.loginPendingUser,pwd)){
          const u=USERS.find(u=>u.id===state.loginPendingUser);
          setCurrentUser(u.id);state.currentUser=u;
          setState({filterNav:u.vesselIds.length===1?String(u.vesselIds[0]):'',loginPendingUser:null,loginError:false});
        }else{
          setState({loginError:true});
        }
      }
      loginCard.appendChild(pwdInp);
      const btnRow=S('div',{style:{display:'flex',gap:'8px',justifyContent:'center'}});
      btnRow.appendChild(S('button',{style:{padding:'10px 20px',border:'1px solid #e2e8f0',borderRadius:'8px',background:'#fff',cursor:'pointer',fontSize:'13px'},onClick:()=>setState({loginPendingUser:null,loginError:false})},'Retour'));
      btnRow.appendChild(S('button',{style:{padding:'10px 20px',border:'none',borderRadius:'8px',background:'#0ea5e9',color:'#fff',cursor:'pointer',fontSize:'13px',fontWeight:600},onClick:tryLogin},'Valider'));
      loginCard.appendChild(btnRow);
    }else{
      loginCard.appendChild(S('p',{style:{fontSize:'14px',color:'#64748b',marginBottom:'32px'}},'Sélectionnez votre profil utilisateur'));
      const grid=S('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(140px, 1fr))',gap:'12px',marginBottom:'24px'}});
      USERS.forEach(u=>{
        const btn=S('button',{style:{padding:'16px',border:'1px solid #e2e8f0',borderRadius:'12px',background:'#fff',cursor:'pointer',transition:'all .15s',fontSize:'13px',fontWeight:500,color:'#1e293b'}});
        btn.appendChild(S('div',{style:{fontSize:'32px',marginBottom:'8px'}},u.role==='admin'?'👤':'⛵'));
        btn.appendChild(S('div',{style:{fontWeight:600,marginBottom:'4px'}},u.nom));
        const vessels=state.vessels.filter(v=>u.vesselIds.includes(v.id));

          btn.appendChild(S('div',{style:{fontSize:'11px',color:'#64748b'}},vessels[0].nom));

        grid.appendChild(btn);
      });

      loginCard.appendChild(S('p',{style:{fontSize:'12px',color:'#94a3b8'}},'Mot de passe requis selon le profil'));

  const cloudBadge=S('div',{id:'cloud-badge',className:'cloud-badge off',onClick:()=>setState({showCloudCfg:!state.showCloudCfg})});
  footer.appendChild(cloudBadge);

    const urlInp=S('input',{type:'text',value:getCloudUrl(),placeholder:'https://script.google.com/macros/s/…/exec',onInput:e=>setCloudUrl(e.target.value.trim())});
    cfg.appendChild(urlInp);
    const cfgBtns=S('div',{style:{display:'flex',gap:'6px',marginTop:'6px'}});
    cfgBtns.appendChild(S('button',{className:'btn btn-p btn-sm',onClick:()=>{cloudLoad(true).then(ok=>{if(ok)alert('Données chargées depuis Google Sheets !');else alert('Aucune donnée trouvée ou erreur.');setState({showCloudCfg:false})})}},icon('download',11),' Charger'));
    cfgBtns.appendChild(S('button',{className:'btn btn-s btn-sm',onClick:()=>{cloudSave();setState({showCloudCfg:false})}},icon('upload',11),' Envoyer'));
    cfg.appendChild(cfgBtns);
    if(getCloudUrl()){
      cfgBtns.appendChild(S('button',{className:'btn btn-s btn-sm',style:{color:'#dc2626'},onClick:()=>{setCloudUrl('');setState({showCloudCfg:false})}},icon('x',11),' Déconnecter'));
    }
    footer.appendChild(cfg);
  }
  const saveBar=S('div',{className:'save-bar'});
  saveBar.appendChild(S('button',{className:'btn btn-s btn-sm',style:{flex:1},onClick:saveData},icon('download',12),' Export JSON'));
  const loadLbl=S('label',{className:'btn btn-s btn-sm',style:{flex:1,cursor:'pointer',textAlign:'center'}},icon('upload',12),' Import JSON');
  const loadInp=S('input',{type:'file',accept:'.json',style:{display:'none'},onchange:loadData});
  loadLbl.appendChild(loadInp);
  saveBar.appendChild(loadLbl);
  footer.appendChild(saveBar);
  sidebar.appendChild(footer);
  app.appendChild(sidebar);
  // Main content
  const main=S('div',{className:'main'});
  const mainInner=S('div',{className:'main-inner'});
  const pgFn=PAGES[state.page]||pgDashboard;
  mainInner.appendChild(pgFn());
  main.appendChild(mainInner);
  app.appendChild(main);
  // Restore focus
  if(focusInfo){
    let target=null;
    if(focusInfo.labelText){
      const labels=app.querySelectorAll('.form-label,.form-group label,label');
      for(const lbl of labels){
        if(lbl.textContent===focusInfo.labelText){
          const container=lbl.parentElement;
          target=container.querySelector(focusInfo.tag.toLowerCase());
          if(target)break;
        }
      }
    }
    if(!target&&focusInfo.tag){
      const inputs=app.querySelectorAll('.modal '+focusInfo.tag.toLowerCase());
      for(const inp of inputs){if(inp.value===focusInfo.val){target=inp;break;}}
    }
    if(target){
      target.focus();
      if(focusInfo.selStart!=null&&target.setSelectionRange){
        try{target.setSelectionRange(focusInfo.selStart,focusInfo.selEnd);}catch(e){}
      }
    }
  }
  // Restore modal scroll position
  const newModal=document.querySelector('.modal');
  if(newModal&&modalScrollTop)newModal.scrollTop=modalScrollTop;
  // Restore main scroll position
  const newMain=document.querySelector('.main');
  if(newMain&&mainScrollTop)newMain.scrollTop=mainScrollTop;
}

// Initialize current user
state.currentUser=getCurrentUser();

// Initial render
render();
updateCloudBadge();
// Auto-load from cloud if configured — block saves until loaded
if(getCloudUrl()){_blockSaveUntilLoaded=true;setTimeout(()=>cloudLoad(true),500)}
// Re-render on resize to toggle mobile/desktop layout
// Re-render on resize only if width changed (avoids Android keyboard height change re-renders)
let resizeTimer,lastWidth=window.innerWidth;
window.addEventListener('resize',()=>{
  if(window.innerWidth===lastWidth)return;
  lastWidth=window.innerWidth;
  // Don't re-render if an input is focused (avoids losing focus on Android keyboard)
  const ae=document.activeElement;
  if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'))return;
  clearTimeout(resizeTimer);resizeTimer=setTimeout(render,200);
})
// PWA: Register service worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
